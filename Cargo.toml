[package]
name = "h33-verify"
version = "0.1.0"
edition = "2021"
description = "Independent offline verifier for H33-74 substrate receipts. Reconstructs the 58-byte substrate per H33 Signing Substrate Spec v1, recomputes SHA3-256, and compares to the claimed on-chain hash. No network. No H33 dependency. Just SHA3 + the published spec."
authors = ["H33 / community"]
license = "Apache-2.0"
repository = "https://github.com/H33ai/h33-verifier"
readme = "README.md"
rust-version = "1.75"

[[bin]]
name = "h33-verify"
path = "src/main.rs"

[lib]
name = "h33_verify"
path = "src/lib.rs"

[dependencies]
sha3 = "0.10"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"

[dev-dependencies]
# none — fixtures are .json files, asserts are stdlib

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
